app = "my-language-coach-agentical-rebuild"
primary_region = "arn"  # Stockholm — co-located with Supabase eu-north-1

# Note: dockerfile + build context are passed explicitly on the flyctl deploy
# command (--dockerfile apps/api/Dockerfile, working dir = monorepo root).
# fly.toml's [build] dockerfile path is interpreted relative to fly.toml,
# which would break for our monorepo layout.

[env]
  NODE_ENV = "production"
  PORT = "8080"

# Apply DB migrations before each release (idempotent — skips already-applied
# ones). Runs in the built image (tsx + the .sql migrations are present) with
# the prod env from Fly secrets. If a migration fails the release fails and the
# deploy is aborted — so code can never ship ahead of its schema again (the
# cause of the 2026-06-27 voice-turns outage). Verified by running this exact
# command in the live machine via `fly ssh` before wiring it in.
[deploy]
  release_command = "/bin/sh -c 'cd /app/apps/api && node --import tsx src/db/run-migrations.ts'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[vm]
  # Bumped from shared-cpu-1x/256MB on 2026-06-05: the 256MB box went
  # unresponsive (failed Fly health checks) under the per-turn TTS synthesis +
  # in-memory inline audio, which starved the event loop and made Gemini Cloud
  # TTS calls exceed their 8s timeout (→ nova fallback voice + long waits).
  size = "shared-cpu-2x"
  memory_mb = 1024
