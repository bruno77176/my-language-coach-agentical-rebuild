app = "my-language-coach-agentical-rebuild"
primary_region = "arn"  # Stockholm — co-located with Supabase eu-north-1

# Note: dockerfile + build context are passed explicitly on the flyctl deploy
# command (--dockerfile apps/api/Dockerfile, working dir = monorepo root).
# fly.toml's [build] dockerfile path is interpreted relative to fly.toml,
# which would break for our monorepo layout.

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[vm]
  size = "shared-cpu-1x"
  memory_mb = 256
